  <style>
    :root {
      --bg: #0a0b0d;
      --bg-card: rgba(255,255,255,0.05);
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --muted-2: #8790a0;
      --line: rgba(255,255,255,0.10);
      --blue: #428FD2;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fc;
        --bg-card: rgba(255,255,255,0.88);
        --text: #0d1422;
        --muted: #526075;
        --muted-2: #6c788b;
        --line: rgba(12,22,40,0.09);
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: -0.03em;
      margin: 0 0 8px;
    }
    .lead {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 1.05rem;
      max-width: 36ch;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      width: min(560px, 100%);
      margin-bottom: 26px;
    }
    .card {
      display: block;
      padding: 16px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--bg-card);
      color: var(--text);
      transition: border-color 160ms ease;
    }
    .card:hover { border-color: var(--blue); text-decoration: none; }
    .card strong { display: block; font-size: 0.98rem; margin-bottom: 3px; }
    .card span { color: var(--muted-2); font-size: 0.85rem; line-height: 1.4; }
    .sub { color: var(--muted-2); font-size: 0.92rem; margin: 0; }

    .logo-light { display: none; }
    .logo-dark { display: block; }
    @media (prefers-color-scheme: light) {
      .logo-dark { display: none; }
      .logo-light { display: block; }
    }
    html[data-theme="dark"] .logo-dark { display: block; }
    html[data-theme="dark"] .logo-light { display: none; }
    html[data-theme="light"] .logo-dark { display: none; }
    html[data-theme="light"] .logo-light { display: block; }

    html[data-theme="dark"] {
      --bg: #0a0b0d;
      --bg-card: rgba(255,255,255,0.05);
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --muted-2: #8790a0;
      --line: rgba(255,255,255,0.10);
    }
    html[data-theme="light"] {
      --bg: #f6f8fc;
      --bg-card: rgba(255,255,255,0.88);
      --text: #0d1422;
      --muted: #526075;
      --muted-2: #6c788b;
      --line: rgba(12,22,40,0.09);
    }

    @media (max-width: 520px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
