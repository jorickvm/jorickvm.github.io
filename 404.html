<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/png" href="/assets/brand/favicon_dark.png?v=20260325a" media="(prefers-color-scheme: dark)" />
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
  <style>
    :root {
      --bg: #0a0b0d;
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --line: rgba(255,255,255,0.10);
      --blue: #1692ff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fc;
        --text: #0d1422;
        --muted: #526075;
        --line: rgba(12,22,40,0.09);
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: -0.03em;
      margin: 0 0 8px;
    }
    p {
      color: var(--muted);
      margin: 0 0 24px;
      font-size: 1.05rem;
    }
    .links {
      display: flex;
      gap: 20px;
      font-size: 0.95rem;
    }

    .logo-light { display: none; }
    .logo-dark { display: block; }
    @media (prefers-color-scheme: light) {
      .logo-dark { display: none; }
      .logo-light { display: block; }
    }
    html[data-theme="dark"] .logo-dark { display: block; }
    html[data-theme="dark"] .logo-light { display: none; }
    html[data-theme="light"] .logo-dark { display: none; }
    html[data-theme="light"] .logo-light { display: block; }

    html[data-theme="dark"] {
      --bg: #0a0b0d;
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --line: rgba(255,255,255,0.10);
    }
    html[data-theme="light"] {
      --bg: #f6f8fc;
      --text: #0d1422;
      --muted: #526075;
      --line: rgba(12,22,40,0.09);
    }
  </style>
</head>
<body>
  <img class="logo logo-dark" src="/assets/brand/logo_dark.png?v=20260325a" alt="AtlasDays logo" />
  <img class="logo logo-light" src="/assets/brand/logo_light.png?v=20260325a" alt="AtlasDays logo" />
  <h1>Page not found</h1>

  </div>
</body>
</html>
