<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Help Center — AtlasDays</title>
  <meta name="description" content="AtlasDays Support now lives in the Help Center." />
  <meta name="robots" content="noindex,follow" />
  <meta http-equiv="refresh" content="0; url=/help/" />
  <link rel="canonical" href="https://atlasdays.app/help/" />
  <link rel="icon" type="image/png" href="assets/brand/favicon_light.png?v=20260325a" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="assets/brand/favicon_dark.png?v=20260325a" media="(prefers-color-scheme: dark)" />
  <script>
    window.location.replace('/help/');
  </script>
  <style>
    :root {
      --bg: #0a0b0d;
      --panel: rgba(255,255,255,0.05);
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --line: rgba(255,255,255,0.10);
      --blue: #1692ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fc;
        --panel: rgba(255,255,255,0.9);
        --text: #0d1422;
        --muted: #526075;
        --line: rgba(12,22,40,0.09);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(520px, 100%);
      padding: 28px 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 4vw, 2rem);
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover,
    a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting to Help Center</h1>
    <p>AtlasDays support now lives in the Help Center.</p>
    <p>If you are not redirected automatically, <a href="/help/">open Help Center</a>.</p>
  </main>
</body>
</html>
