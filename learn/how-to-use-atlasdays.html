<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Getting Started — AtlasDays Help Center</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://atlasdays.app/help/getting-started" />
  <meta http-equiv="refresh" content="0;url=/help/getting-started" />
  <link rel="icon" type="image/png" href="../assets/brand/favicon_light.png?v=20260325a" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="../assets/brand/favicon_dark.png?v=20260325a" media="(prefers-color-scheme: dark)" />
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark')})()</script>
  <style>
    :root {
      --bg: #0a0b0d;
      --text: #f4f7fb;
      --muted: #b2b9c5;
      --line: rgba(255,255,255,0.10);
      --blue: #1692ff;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f6f8fc; --text: #0d1422; --muted: #526075; --line: rgba(12,22,40,0.09); }
    }
    html[data-theme="dark"] { --bg: #0a0b0d; --text: #f4f7fb; --muted: #b2b9c5; }
    html[data-theme="light"] { --bg: #f6f8fc; --text: #0d1422; --muted: #526075; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    p { color: var(--muted); margin: 12px 0 0; font-size: 0.97rem; }
    a { color: var(--blue); }
  </style>
</head>
<body>
  <div>
    <p>This page has moved to the Help Center.</p>
    <p><a href="/help/getting-started">Go to Getting Started →</a></p>
  </div>
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon="{&quot;token&quot;: &quot;1488e163b83a4eee81b63340359b6566&quot;}"></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
